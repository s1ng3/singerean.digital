<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Web Security — Practice Quiz</title>
<link rel="icon" href="../favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#000000;--card:#111111;--card2:#1a1a1a;--txt:#ffffff;--muted:#999999;
        --green:#2ecc71;--greenbg:#0e2e1a;--red:#D90429;--redbg:#2e0a0e;--accent:#E63946;--line:#2a2a2a;
        --yellow:#f5b041;--yellowbg:#332811;}
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(160deg,#000000,#111111);color:var(--txt);
       font-family:'Inter',system-ui,Segoe UI,Roboto,Arial,sans-serif;line-height:1.5;}
  .wrap{max-width:760px;margin:0 auto;padding:24px 16px 60px;}
  h1{font-size:20px;margin:4px 0 2px;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
  .home-link{display:inline-block;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;
             margin-bottom:6px;transition:color .15s;}
  .home-link:hover{color:var(--accent);}
  .bar{height:8px;background:var(--card2);border-radius:6px;overflow:hidden;margin:10px 0 18px;}
  .bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s;}
  .meta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:8px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;}
  .qtype{display:inline-block;font-size:11px;letter-spacing:.04em;text-transform:uppercase;
         color:var(--accent);background:rgba(230,57,70,0.12);border:1px solid rgba(230,57,70,0.4);padding:3px 9px;border-radius:20px;margin-bottom:10px;}
  .qtext{font-size:17px;font-weight:600;margin:6px 0 16px;}
  .opt{display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;cursor:pointer;
       background:var(--card2);border:1.5px solid var(--line);color:var(--txt);
       padding:13px 14px;border-radius:11px;margin:9px 0;font-size:15px;transition:.12s;}
  .opt:hover:not(.locked){border-color:var(--accent);}
  .opt .mark{flex:0 0 20px;height:20px;border-radius:6px;border:1.5px solid var(--muted);
             display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:1px;}
  .opt.single .mark{border-radius:50%;}
  .opt.selected{border-color:var(--accent);background:rgba(230,57,70,0.15);}
  .opt.selected .mark{background:var(--accent);border-color:var(--accent);}
  .opt.correct{background:var(--greenbg);border-color:var(--green);}
  .opt.correct .mark{background:var(--green);border-color:var(--green);}
  .opt.missed{background:var(--yellowbg);border-color:var(--yellow);}
  .opt.missed .mark{background:var(--yellow);border-color:var(--yellow);color:#111111;}
  .opt.wrong{background:var(--redbg);border-color:var(--red);}
  .opt.wrong .mark{background:var(--red);border-color:var(--red);}
  .opt.locked{cursor:default;}
  .feedback{min-height:22px;margin:14px 2px 4px;font-weight:600;font-size:14px;}
  .feedback.ok{color:var(--green);} .feedback.no{color:var(--red);}
  .row{display:flex;gap:10px;justify-content:flex-end;margin-top:14px;}
  button.btn{background:var(--accent);color:#fff;border:0;padding:11px 22px;border-radius:10px;
             font-size:15px;font-weight:600;cursor:pointer;}
  button.btn:hover{filter:brightness(1.08);}
  button.btn.ghost{background:#1f1f1f;}
  button.btn[disabled]{opacity:.45;cursor:not-allowed;}
  .hint{color:var(--muted);font-size:13px;margin:-2px 2px 4px;}
  .result{text-align:center;padding:30px 10px;}
  .score{font-size:44px;font-weight:800;margin:6px 0;}
  .scoresub{color:var(--muted);margin-bottom:18px;}
  .legend{color:var(--muted);font-size:12px;margin-top:14px;text-align:center;}
  .hud-container {
    display: contents;
  }
  .hud-group-left {
    position: fixed;
    top: 24px;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 999;
  }
  .hud {
    background: var(--card);
    border: 1px solid var(--line);
    padding: 14px 18px;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    min-width: 140px;
  }
  .hud.right {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 999;
  }
  .hud-title {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }
  .hud-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--txt);
    font-family: monospace;
  }
  .hud-value.timer {
    color: var(--accent);
  }
  
  /* Music & SFX Widget Styling */
  .music-widget, .sfx-widget {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 8px;
    height: 48px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    max-width: 48px;
    z-index: 999;
  }
  .music-widget:hover {
    max-width: 180px;
    padding-right: 14px;
  }
  .music-btn, .sfx-btn {
    background: transparent;
    border: none;
    color: var(--txt);
    font-size: 18px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s, transform 0.1s, opacity 0.15s;
    flex-shrink: 0;
  }
  .music-btn:hover, .sfx-btn:hover {
    background: var(--card2);
  }
  .music-btn:active, .sfx-btn:active {
    transform: scale(0.95);
  }
  .volume-ctrl {
    width: 100px;
    margin-left: 8px;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    display: flex;
    align-items: center;
  }
  .music-widget:hover .volume-ctrl {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }
  .volume-ctrl input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    outline: none;
  }
  .volume-ctrl input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .volume-ctrl input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }
  .volume-ctrl input[type="range"]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border: none;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .volume-ctrl input[type="range"]::-moz-range-thumb:hover {
    transform: scale(1.2);
  }

  @media (max-width: 1100px) {
    .hud-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      width: 100%;
    }
    .hud-group-left {
      position: static;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: auto;
    }
    .hud {
      position: static;
      box-shadow: none;
      border: none;
      padding: 0;
      min-width: 0;
      background: transparent;
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }
    .hud.right {
      position: static;
      z-index: auto;
    }
    .hud-title {
      margin-bottom: 0;
    }
    .music-widget, .sfx-widget {
      box-shadow: none;
      background: transparent;
      border: none;
      height: auto;
      padding: 0;
    }
    .music-widget:hover, .sfx-widget:hover {
      padding-right: 0;
    }
  }
  .hud-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hud-btn {
    background: #1f1f1f;
    border: 1px solid var(--line);
    color: var(--txt);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
  }
  .hud-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .hud-btn:active {
    transform: scale(0.95);
  }
  .pause-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 998;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    animation: fadeIn 0.25s ease-out forwards;
  }
  .pause-msg {
    font-size: 28px;
    font-weight: 800;
    color: var(--txt);
    text-align: center;
    background: var(--card);
    border: 1px solid var(--line);
    padding: 20px 40px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .wrap {
    transition: filter 0.3s ease;
  }
  body.is-paused .wrap {
    filter: blur(8px);
    pointer-events: none;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes scaleUp {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  #effect-canvas {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 1000;
  }
</style>
</head>
<body>
<canvas id="effect-canvas"></canvas>
<div class="hud-container">
  <div class="hud-group-left">
    <div class="hud left" id="hud-left">
      <div class="hud-title">Time Left</div>
      <div class="hud-row">
        <div class="hud-value timer" id="hud-timer">1:00:00</div>
        <button class="hud-btn" id="btn-pause" onclick="togglePause()" title="Pause Quiz">⏸</button>
      </div>
    </div>
    
    <!-- SFX Widget -->
    <div class="sfx-widget" id="sfx-widget">
      <button class="sfx-btn" id="btn-sfx" onclick="toggleSFX()" title="Mute Sound Effects">📣</button>
    </div>
    
    <div class="music-widget" id="music-widget">
      <button class="music-btn" id="btn-music" onclick="toggleMute()" title="Unmute Music">🔇</button>
      <div class="volume-ctrl">
        <input type="range" id="slider-volume" min="0" max="1" step="0.05" value="0.5" oninput="setVolume(this.value)">
      </div>
    </div>
  </div>
  
  <div class="hud right" id="hud-right">
    <div class="hud-title">Score</div>
    <div class="hud-row">
      <div class="hud-value" id="hud-score">0.00 / 10.00</div>
      <button class="hud-btn" id="btn-reset" onclick="resetQuiz()" title="Reset Quiz">⟳</button>
    </div>
  </div>
</div>
<div class="pause-overlay" id="pause-overlay" onclick="togglePause()">
  <div class="pause-msg">Quiz Paused<br><span style="font-size:13px; font-weight:normal; color:var(--muted); margin-top:8px; display:inline-block;">Click anywhere to resume</span></div>
</div>
<div class="wrap">
  <a class="home-link" href="../">← singerean.digital</a>
  <h1>Web Security — Practice Quiz</h1>
  <div class="sub">48 questions · order &amp; answers reshuffled every run</div>
  <div class="bar"><i id="bar"></i></div>
  <div class="meta"><span id="progress"></span><span id="scoremeta"></span></div>
  <div id="app"></div>
  <div class="legend">Single-answer: click an option. Multi-answer: tick all that apply, then Confirm.</div>
</div>

<script type="application/json" id="quiz-data">[{"id": 1, "question": "How do you define the World Wide Web?", "multi": false, "options": ["a collection of all web applications implemented using HTML, accessible over HTTP through a web browser", "an information system created over the Internet, which allows interconnection and cross-referencing of elements through hyperlinks", "a global network of computers providing communication and information facilities, built by interconnecting local networks via standardized protocols", "a set of communication protocols (e.g. HTTP) and encoding standards (e.g. HTML) that facilitate the implementation of web applications"], "correct": [1], "explanation": "The Web is an information system using hyperlinks over the Internet. Option 2 describes the Internet. The Web encompasses more than just protocols or HTML apps."}, {"id": 2, "question": "Which one of the following correctly defines a Web Application?", "multi": false, "options": ["the applications that can be run only inside a browser and can be accessed only over HTTP protocol", "applications developed using the client-server conceptual architecture, and that communicate using TCP/IP", "any application that downloads components or information from the Web over HTTP, each time it runs", "the applications accessible over HTTP protocol that are also described in HTML language and include active components implemented in JavaScript"], "correct": [2], "explanation": "Web applications follow client-server architecture and communicate over network protocols like TCP/IP, not limited to browser-only or HTTP-only scenarios."}, {"id": 3, "question": "Which ones of the following are specific to Web 2.0, when compared to Web 1.0?", "multi": true, "options": ["stateless - retains no state information", "the content displayed in the browsers is dynamic", "client-side code execution to create dynamic and more responsive User Interfaces", "promotes the concept of Software as a Service (SaaS)", "inclusion of semantic information in the content distributed over internet"], "correct": [1, 2, 3], "explanation": "Web 2.0 features dynamic content, client-side JavaScript for rich UIs, and SaaS models. Statelessness exists in both. Semantic web is Web 3.0 concept."}, {"id": 4, "question": "HyperText Markup Language is:", "multi": true, "options": ["a markup language that defines two main sections: HEAD and BODY, which can be used only once in the same HTML document", "the essential component for all web applications", "a text-based description language that uses tags and attributes", "a hierarchical structure having DOCTYPE as root element"], "correct": [0, 2], "explanation": "HTML is a text-based markup language using tags and attributes to describe document structure. Not all web applications require HTML (e.g., APIs)."}, {"id": 5, "question": "Define the term HEAD in the context of web applications:", "multi": true, "options": ["an HTTP method", "the section at the beginning of a resource that contains information about its type and structure", "a tag in HTML description language", "short name for the header of any HTTP message"], "correct": [0, 1, 2], "explanation": "HEAD is an HTTP method (like GET), an HTML document section (<head>), and colloquially refers to HTTP message headers. All three uses are valid."}, {"id": 6, "question": "The layers of the TCP/IP conceptual model are:", "multi": false, "options": ["application, session, transport, network", "application, transport, connection, network", "application, network, connection, physical layer", "application, transport, internet, network"], "correct": [3], "explanation": "The TCP/IP model consists of 4 layers: Application, Transport, Internet, and Network Access (Network Interface)."}, {"id": 7, "question": "The layers of the ISO-OSI conceptual model are:", "multi": false, "options": ["application, encapsulation, security, transport, network, physical level", "application, presentation, transport, security, network, connection, data link, physical level", "application, presentation, session, transport, network, data link, physical level", "interface, application, session, transport, network, data link, physical level"], "correct": [2], "explanation": "The OSI model has 7 layers: Application, Presentation, Session, Transport, Network, Data Link, and Physical (top to bottom)."}, {"id": 8, "question": "Data encapsulation:", "multi": true, "options": ["prevents \"man in the middle\" attacks", "ensures data integrity and protects it from unauthorized modifications", "ensures the independence of the message's format and content from the transmission medium", "eliminates the need to know the specifics of adjacent layers within the current layer"], "correct": [2, 3], "explanation": "Encapsulation allows each layer to operate independently without needing to understand the implementation details of adjacent layers."}, {"id": 9, "question": "Indicate correct sentences", "multi": true, "options": ["in web applications, the server does not store state information", "all the messages exchanged between client and server during a working session follow the same route", "in web applications, client-server communication is always initiated by the client", "in all web applications, all communication takes place through the container (browser)"], "correct": [0, 2], "explanation": "HTTP is stateless (server doesn't inherently store state) and client-initiated. Messages may take different routes, and not all web apps require browsers."}, {"id": 10, "question": "Indicate correct claims about HTTP:", "multi": true, "options": ["communication is bidirectional and can be initiated either by the server or by the client", "the messages header is mandatory, but the body of the message can be empty", "it is a transactional communication model based on messages", "communication is intermittent and stateless from the server perspective", "messages have a tree-like structure with two main sections: HEAD and BODY"], "correct": [1, 2, 3], "explanation": "HTTP is client-initiated (not bidirectional), has mandatory headers with optional bodies, is transactional and stateless. HEAD/BODY refers to HTML, not HTTP messages."}, {"id": 11, "question": "The first line of an HTTP header for a REQUEST message contains:", "multi": true, "options": ["data compression algorithms (ex. gzip)", "HTTP method used in the request", "accepted data types", "HTTP protocol version", "resource URL"], "correct": [1, 3, 4], "explanation": "HTTP request line contains: Method (GET/POST), URL/path, and HTTP version. Compression and accepted types are in header fields, not the request line."}, {"id": 12, "question": "The first line of an HTTP header for a RESPONSE message contains:", "multi": true, "options": ["HTTP protocol version", "called HTTP method", "textual description of the response code", "URL of accessed resource", "numeric response code"], "correct": [0, 2, 4], "explanation": "HTTP response status line contains: HTTP version, numeric status code, and reason phrase (textual description). Methods and URLs are in requests."}, {"id": 13, "question": "Which of the following elements is NOT part of an HTTP POST request?", "multi": false, "options": ["POST data", "numeric code of HTTP result", "Cookie header", "User-agent header"], "correct": [1], "explanation": "The numeric HTTP result code (status code) is part of the RESPONSE, not the request. Requests contain method, headers, and optional body data."}, {"id": 14, "question": "Please indicate the body of the given HTTP message (HTTP/1.1 200 OK ... headers ... Message-content: <html>...).", "multi": false, "options": ["<html><head><title>Test document</title></head><body>This is the content of the document</body></html>", "Message-content: <html>...</html>", "Cache-Control: no-store... / Pragma: no-cache / Message-content:", "Cache-Control: no-store... / Pragma: no-cache / Message-content: <html>...</html>"], "correct": [0], "explanation": "The HTTP message body is the content after the blank line separating headers from body. In this case, it's the HTML document content."}, {"id": 15, "question": "Which of the following is NOT allowed in an HTTP header?", "multi": true, "options": ["using \n\r in the value of a header", "insert a blank line", "use of character : (two points) in the value of a header", "using characters ?, &, space, /"], "correct": [0, 1], "explanation": "Literal CR/LF characters in header values enable HTTP response splitting and header injection attacks. They must be encoded or rejected."}, {"id": 16, "question": "Which ones of the following sentences are true about DNS?", "multi": true, "options": ["DNS requests are always reaching the root DNS servers", "the result of a DNS query is an IP address", "ROOT servers host information about all the registered domains and subdomains", "DNS servers are using the \"/\" character as subdomain separator"], "correct": [1], "explanation": "DNS queries return IP addresses (among other record types). Requests don't always reach root servers (caching exists). Root servers know TLDs only. DNS uses dots, not slashes."}, {"id": 17, "question": "Which one of the following can be included in a parameterless URL?", "multi": true, "options": ["reference to an element of the document", "access protocol", "domain or IP", "connection port", "user identification information"], "correct": [0, 1, 2, 3, 4], "explanation": "A URL can contain all these components: protocol (http://), domain/IP, port (:80), user info (user@), and fragment (#element). 'Parameterless' means no query string (?)."}, {"id": 18, "question": "Which of the following conditions need to be met for two resources to be considered as having the same origin?", "multi": true, "options": ["the resources can be accessed through the sub-domains of the same domain", "server is identified through the same domain name for both resources", "accessed through the same protocol", "same port is used for communication", "both resources are in the same path on the server(s)"], "correct": [1, 2, 3], "explanation": "Same origin requires matching protocol, domain, and port. Sub-domains and paths do not affect origin determination."}, {"id": 19, "question": "The \"content origin\" concept is used for:", "multi": true, "options": ["limiting the execution rights of active code within the browser, depending on the origin from which it is loaded", "controlling access from active code to user information (cookies, persistent data) and to the DOM", "preventing unauthorized access during data transmission between client and server", "verifying the authenticity of the received information and preventing impersonation attacks"], "correct": [0, 1], "explanation": "Same-origin policy restricts code execution rights and access to sensitive resources (cookies, DOM) based on the origin. It doesn't protect transmission or verify authenticity."}, {"id": 20, "question": "Identity is:", "multi": false, "options": ["SSL certificate issued by recognized authorities in the field", "the expression of the individuality of a certain entity", "all information relating to an identified or identifiable natural person", "all specific elements known/possessed only by the user, including papillary, ocular, dental, or DNA characteristics"], "correct": [1], "explanation": "Identity is the expression of individuality of an entity. Option 3 describes personal data (GDPR). Option 4 describes biometric authentication factors."}, {"id": 21, "question": "What is verified through authentication?", "multi": false, "options": ["what resources are accessible by the user", "what actions can the user take", "who the user is", "if the user already has an active working session"], "correct": [2], "explanation": "Authentication verifies identity (who the user is). Authorization determines what resources/actions are permitted. Session management tracks active sessions."}, {"id": 22, "question": "Authentication is:", "multi": true, "options": ["a process that can be implemented only through SSL certificates", "certification of the authenticity of data received by the client from the server or by the server from the client", "the process of ensuring the integrity of data transmitted between the client and the server", "process of verifying the identity of an entity"], "correct": [3], "explanation": "Authentication verifies identity. Data authenticity/integrity is different (signatures, hashes). SSL certificates are one authentication method, not the only one."}, {"id": 23, "question": "Two factor authentication requires:", "multi": false, "options": ["using two passwords for authentication", "verifying the user's identity through a password and an additional piece of information obtained via an alternative method", "replacing the classic password-based method with sending a code via SMS or generating a code using a physical device", "requesting the password in a subsequent step, only after the username has been entered correctly"], "correct": [1], "explanation": "2FA requires two different factors: something you know (password) plus something you have (device/code) or something you are (biometric). Two passwords is still single-factor."}, {"id": 24, "question": "In a working session authentication is performed:", "multi": false, "options": ["each time the user requests the update of personal / access data", "only once, when the working session starts, usually through username and password or two factor authentication", "on each request made to the server", "when the user tries to change the password"], "correct": [1], "explanation": "Authentication occurs once at session start. Subsequent requests are authorized via session tokens/cookies, not re-authentication."}, {"id": 25, "question": "We can protect a web application from brute force authentication attacks through:", "multi": false, "options": ["limiting the number of login tries", "use of certificates and communication over TLS", "validating correctly the input to prevent XSS attacks", "validating correctly the input against SQL injections"], "correct": [0], "explanation": "Rate limiting (limiting login attempts) directly prevents brute force attacks. TLS protects transmission, not authentication attempts."}, {"id": 26, "question": "Which of the following factors favor brute-force attacks during authentication?", "multi": true, "options": ["omitting the HTTP ONLY specification for cookie handling", "storing passwords in plain text in the database", "unlimited number of login attempts", "vulnerability to reflected XSS attacks", "acceptance of passwords with a low level of complexity"], "correct": [2, 4], "explanation": "Unlimited login attempts allow unrestricted guessing. Low complexity passwords are easier to crack. Plain text storage affects breach impact, not brute force feasibility."}, {"id": 27, "question": "The vulnerability that favors \"session fixation\" attacks can be described as:", "multi": false, "options": ["using excessively long timeouts before session expiration due to inactivity", "using the same token for multiple work sessions of the same user on different devices", "persistent storage of the session token for the \"Remember me\" functionality", "using the same token to identify both an anonymous session and an authenticated session"], "correct": [3], "explanation": "Session fixation exploits applications that don't regenerate session IDs after authentication. An attacker sets a known session ID before the victim logs in."}, {"id": 28, "question": "Which of the following can be used to bypass authentication?", "multi": false, "options": ["0' LIMIT 1 #", "' OR 1=1 LIMIT 1 #", "user' OR id=1", "0 ORDER BY 1 #"], "correct": [1], "explanation": "' OR 1=1 LIMIT 1 # is a classic SQL injection that makes the WHERE clause always true, potentially returning the first user (often admin) and bypassing authentication."}, {"id": 29, "question": "In the following SQL query the 'id' is a value from the user: $sql = \"SELECT * FROM users WHERE id=\" . $_GET['id']; Which one of the following can be used to determine the number of columns in the 'users' table?", "multi": false, "options": ["0 ORDER BY 5", "UNION ALL SELECT NULL,NULL,NULL,NULL,NULL", "0 UNION ALL SELECT table_name FROM information_schema.tables", "0 OR 1=1"], "correct": [0], "explanation": "ORDER BY enumeration tests column counts until an error occurs. UNION requires knowing the exact column count first. OR 1=1 returns all rows without revealing structure."}, {"id": 30, "question": "Second order SQL injection is:", "multi": false, "options": ["successfully formulating and executing a malicious query even after input data validation", "execution of injection when constructing a query using information already stored in the database", "execution of injection based on data transmitted using a cookie", "execution of injection by constructing a query with unvalidated data sent to the server as a result of a successful XSS attack"], "correct": [1], "explanation": "Second-order SQL injection occurs when previously stored (and seemingly safe) data is later used in a query without proper sanitization, triggering the injection."}, {"id": 31, "question": "Which of the following can be achieved through SQL injection?", "multi": true, "options": ["impersonate server certificate", "launch a stored XSS attack", "authorisation bypass", "launch a DOM XSS attack (type 0)"], "correct": [1, 2], "explanation": "SQL injection can bypass authorization and store malicious scripts in the database for stored XSS. It cannot impersonate certificates or cause DOM XSS directly."}, {"id": 32, "question": "SQL injection attacks can be mitigated by:", "multi": true, "options": ["separating SQL queries from data", "proper sanitization of inputs on the client side before sending them to the server", "using parameterized SQL queries and avoiding concatenations", "allowing access to the database only for applications on the same machine"], "correct": [0, 2], "explanation": "Parameterized queries (prepared statements) separate SQL code from data, preventing injection. Client-side sanitization is insufficient as attackers bypass it."}, {"id": 33, "question": "Which of the following objectives can be achieved through XSS attacks?", "multi": true, "options": ["exfiltrate session token", "access an http-only cookie", "bypass authentication", "access the DOM and change how a page is displayed"], "correct": [0, 3], "explanation": "XSS can steal session tokens (non-httpOnly), bypass authentication, and manipulate the DOM. HttpOnly cookies are specifically protected from JavaScript access."}, {"id": 34, "question": "Which of the values for user_parameter allows XSS attack in the following line: <a href=\"user_parameter\">Click me</a>", "multi": true, "options": ["\" javascript:alert(1);", "javascript:alert(1);", "<script>alert(1)<\/script>", "\"><script>alert(1)<\/script><a title=\""], "correct": [1, 3], "explanation": "To inject into an href attribute, you need to close the attribute first with \"> then inject script. Option 3 properly escapes and injects malicious code."}, {"id": 35, "question": "Which of the following statements are correct regarding DOM XSS attacks?", "multi": true, "options": ["can be prevented through proper validation and sanitization of user inputs on the server", "they manifest as a result of malicious JavaScript code being transmitted from the server to the client", "malicious code cannot be detected by the server", "the malicious code is executed by legitimate functions loaded on the client"], "correct": [2, 3], "explanation": "DOM XSS occurs entirely client-side when JavaScript processes untrusted data. The server never sees the malicious payload, and legitimate JS functions execute the attack."}, {"id": 36, "question": "Indicate correct sentences (select one or more):", "multi": true, "options": ["for each external reference in the HTML code a new request is made towards the indicated server", "HTML documents can include the content from images and video files in binary format", "the browser starts the content display only after the JavaScript code in the BODY is executed", "external references from the HEAD section are loaded, processed and executed before the actual display of the content starts"], "correct": [0, 1, 3], "explanation": "HEAD resources block rendering. Each external resource triggers a new HTTP request. Browsers render progressively and embed resources via references, not binary inclusion."}, {"id": 37, "question": "The purpose of CSRF token is:", "multi": true, "options": ["strengthening authentication by using a second identification factor alongside the cookie", "ensuring the integrity of data transmitted through forms", "preventing clickjacking attacks", "preventing automatic requests from being made on behalf of the user through XSS techniques"], "correct": [0], "explanation": "CSRF tokens prevent Cross-Site Request Forgery by ensuring requests originate from legitimate pages, not malicious sites exploiting the user's authenticated session."}, {"id": 38, "question": "It is recommended to generate the CSRF token:", "multi": false, "options": ["each time a new work session is initiated", "with every request sent to the server", "automatically, at certain time intervals", "when user data is updated (username, password)"], "correct": [0], "explanation": "CSRF tokens should be generated per session and remain valid throughout that session. Generating per-request is unnecessary overhead."}, {"id": 39, "question": "Indicate correct affirmations about CSRF:", "multi": true, "options": ["the CSRF token can be exfiltrated by an attacker through HTML or CSS injection", "the CSRF token cannot be efficient if the \"same origin\" policies are not enforced", "it is best practice to have no connection between the CSRF and session tokens", "the CSRF token cannot be exfiltrated through reflected XSS attacks"], "correct": [0, 1], "explanation": "CSRF tokens require same-origin enforcement to work. They should be independent from session tokens. XSS (not HTML/CSS injection) can exfiltrate CSRF tokens."}, {"id": 40, "question": "X-Frame-Options: none is useful for:", "multi": false, "options": ["preventing \"clickjacking\" attacks", "preventing stored XSS attacks", "preventing CSRF attacks", "preventing SQL injection attacks"], "correct": [0], "explanation": "X-Frame-Options controls whether a page can be embedded in iframes, preventing clickjacking attacks where malicious sites overlay invisible iframes."}, {"id": 41, "question": "Encrypting data:", "multi": true, "options": ["ensures data confidentiality", "always certifies the identity of the sender", "ensures data integrity", "prevents man-in-the-middle attacks"], "correct": [0], "explanation": "Encryption primarily ensures confidentiality. It does not guarantee integrity, authentication, or prevent MITM without additional mechanisms like signatures and certificates."}, {"id": 42, "question": "Which one of the following statements are true?", "multi": true, "options": ["the compromise of an encryption algorithm allows the decryption of any message encrypted with it", "the compromise of a sufficient number of encryption keys leads to the compromise of the entire algorithm", "identifying a method to quickly traverse all keys constitutes a complete compromise of the encryption algorithm", "the compromise of some encryption keys facilitates the compromise of other keys if they are used with the same encryption algorithm"], "correct": [0, 2], "explanation": "A complete compromise of an encryption algorithm occurs when a method is found to efficiently traverse or determine all possible keys."}, {"id": 43, "question": "Which ones of the following statements are true?", "multi": true, "options": ["the difficulty of breaking an encryption code is not influenced by how easily the parameters can be predicted", "the difficulty of breaking an encryption code depends on the number of possible values of its parameters", "access to the implementation of an encryption algorithm based on encryption keys leads to its compromise", "an encryption key is a parameter of an encryption algorithm"], "correct": [1, 3], "explanation": "Encryption strength depends on key space size (number of possible values), and the encryption key is indeed a parameter of the algorithm. Predictability DOES affect security."}, {"id": 44, "question": "The purpose of an Initialisation Vector is:", "multi": true, "options": ["to initialize the random number generator to obtain better keys", "to allow the safe reuse of encryption keys in the case of streams", "to ensure the standard length of the data block", "to ensure obtaining a different ciphertext when encrypting the same text with the same key"], "correct": [1, 3], "explanation": "IVs ensure identical plaintext produces different ciphertext (semantic security) and enable safe key reuse in stream/block cipher modes."}, {"id": 45, "question": "Asymmetric keys:", "multi": true, "options": ["in communication between client and server, they are used for the exchange of symmetric keys", "in 1-to-N communication, one private key and N public keys are required", "are used to encrypt all messages transmitted between the client and the server", "solve the problem of transferring symmetric keys at the beginning of encrypted communication"], "correct": [0, 3], "explanation": "Asymmetric cryptography solves key distribution by securely exchanging symmetric keys. Symmetric encryption is then used for bulk data (faster). One key pair serves all recipients."}, {"id": 46, "question": "Digital signature:", "multi": true, "options": ["is encrypted using the public key", "is encrypted using the private key", "certifies the identity of the entity who wrote the message", "ensures data integrity"], "correct": [1, 2, 3], "explanation": "Digital signatures are created by encrypting a hash with the private key. They verify sender identity and ensure data hasn't been modified."}, {"id": 47, "question": "Which of the following elements obtained by an attacker can lead to the compromise of the private key?", "multi": false, "options": ["none of the listed elements", "the source code of the encryption algorithm used by the server", "source data sent by the server, encrypted with the private key", "public key of the server"], "correct": [0], "explanation": "By design, knowing the algorithm, public key, or encrypted data should NOT compromise the private key. This is the foundation of asymmetric cryptography security."}, {"id": 48, "question": "Certificates used in web applications can:", "multi": true, "options": ["protect web applications against clickjacking attacks", "protect web applications against XSS attacks", "authenticate the source of information transmitted", "secure information when it is saved in the database"], "correct": [2], "explanation": "SSL/TLS certificates authenticate the server's identity to clients. They don't prevent XSS, clickjacking, or encrypt data at rest in databases."}]</script>
<script>
const RAW = JSON.parse(document.getElementById('quiz-data').textContent);
const app = document.getElementById('app');
const bar = document.getElementById('bar');
const prog = document.getElementById('progress');
const scoremeta = document.getElementById('scoremeta');
let order, qi, score, answered, cur;
let timeLeft, timerInterval;
let isPaused = false;

// Background Music Setup
const bgMusic = new Audio('music.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.5;
bgMusic.muted = true; // Mute the main music initially
let isMuted = true; // Set initial mute state to true

// Sound Effects Setup
const soundCorrect = new Audio('good.mp3');
soundCorrect.volume = 0.4;
const soundIncorrect = new Audio('bad.wav');
soundIncorrect.volume = 0.4;
let sfxEnabled = true;

// Victory Music Setup
const winMusic = new Audio('win.mp3');
winMusic.loop = true;
winMusic.volume = 0.5;

// Sad Music Setup
const sadMusic = new Audio('sadsongfinal.mp3');
sadMusic.loop = true;
sadMusic.volume = 0.5;

// Confetti & Rain Particles Engine
let confettiActive = false;
let rainActive = false;
let confettiCanvas, ctx;
let particles = [];
let rainDrops = [];

function initConfetti() {
  confettiCanvas = document.getElementById('effect-canvas');
  if (confettiCanvas) {
    ctx = confettiCanvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
  }
}

function resizeCanvas() {
  if (confettiCanvas) {
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
  }
}

class ConfettiParticle {
  constructor() {
    this.x = Math.random() * confettiCanvas.width;
    this.y = Math.random() * -confettiCanvas.height;
    this.size = Math.random() * 8 + 6;
    this.color = `hsl(${Math.random() * 360}, 85%, 60%)`;
    this.speedX = Math.random() * 4 - 2;
    this.speedY = Math.random() * 3 + 2;
    this.rotation = Math.random() * 360;
    this.rotationSpeed = Math.random() * 4 - 2;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.rotation += this.rotationSpeed;
    if (this.y > confettiCanvas.height) {
      this.y = -10;
      this.x = Math.random() * confettiCanvas.width;
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation * Math.PI / 180);
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
    ctx.restore();
  }
}

class RainDrop {
  constructor() {
    this.reset();
    this.y = Math.random() * confettiCanvas.height; // Spread them vertically on init
  }
  reset() {
    this.x = Math.random() * confettiCanvas.width;
    this.y = -20;
    this.layer = Math.floor(Math.random() * 3); // 0: far, 1: mid, 2: near
    if (this.layer === 0) {
      this.length = Math.random() * 8 + 6;
      this.speedY = Math.random() * 6 + 8;
      this.speedX = Math.random() * 1 - 0.5;
      this.opacity = Math.random() * 0.2 + 0.15;
      this.lineWidth = 1;
    } else if (this.layer === 1) {
      this.length = Math.random() * 15 + 10;
      this.speedY = Math.random() * 10 + 14;
      this.speedX = Math.random() * 1.5 - 0.75;
      this.opacity = Math.random() * 0.3 + 0.3;
      this.lineWidth = 1.5;
    } else {
      this.length = Math.random() * 25 + 20;
      this.speedY = Math.random() * 14 + 20;
      this.speedX = Math.random() * 2 - 1;
      this.opacity = Math.random() * 0.4 + 0.5;
      this.lineWidth = 2.5;
    }
    this.color = `rgba(174, 207, 238, ${this.opacity})`;
  }
  update() {
    this.y += this.speedY;
    this.x += this.speedX;
    if (this.y > confettiCanvas.height) {
      this.reset();
    }
  }
  draw() {
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.lineWidth;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x + this.speedX * 1.5, this.y + this.length);
    ctx.stroke();
  }
}

function startConfetti() {
  if (confettiActive) return;
  confettiActive = true;
  particles = [];
  for (let i = 0; i < 150; i++) {
    particles.push(new ConfettiParticle());
  }
  function animate() {
    if (!confettiActive) return;
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animate);
  }
  animate();
}

function stopConfetti() {
  confettiActive = false;
  if (ctx) ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
}

function startRain() {
  if (rainActive) return;
  rainActive = true;
  rainDrops = [];
  for (let i = 0; i < 250; i++) {
    rainDrops.push(new RainDrop());
  }
  function animate() {
    if (!rainActive) return;
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
    ctx.fillRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    rainDrops.forEach(d => {
      d.update();
      d.draw();
    });
    requestAnimationFrame(animate);
  }
  animate();
}

function stopRain() {
  rainActive = false;
  if (ctx) ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
}



function initMusic() {
  bgMusic.play().catch(() => {
    // Autoplay blocked, wait for user interaction to resume
    const playOnInteraction = () => {
      bgMusic.play().catch(e => console.log("Music play failed:", e));
      document.removeEventListener('click', playOnInteraction);
      document.removeEventListener('keydown', playOnInteraction);
      document.removeEventListener('touchstart', playOnInteraction);
    };
    document.addEventListener('click', playOnInteraction);
    document.addEventListener('keydown', playOnInteraction);
    document.addEventListener('touchstart', playOnInteraction);
  });
}

function toggleMute() {
  const slider = document.getElementById('slider-volume');
  if (isMuted) {
    isMuted = false;
    bgMusic.muted = false;
    winMusic.muted = false;
    sadMusic.muted = false;
    if (bgMusic.volume === 0) {
      bgMusic.volume = 0.5;
      if (slider) slider.value = 0.5;
    }
    const btn = document.getElementById('btn-music');
    btn.textContent = '🔊';
    btn.title = 'Mute Music';
  } else {
    isMuted = true;
    bgMusic.muted = true;
    winMusic.muted = true;
    sadMusic.muted = true;
    const btn = document.getElementById('btn-music');
    btn.textContent = '🔇';
    btn.title = 'Unmute Music';
  }
}

function setVolume(val) {
  const v = parseFloat(val);
  bgMusic.volume = v;
  const btn = document.getElementById('btn-music');
  if (v === 0) {
    isMuted = true;
    bgMusic.muted = true;
    winMusic.muted = true;
    sadMusic.muted = true;
    if (btn) btn.textContent = '🔇';
  } else {
    isMuted = false;
    bgMusic.muted = false;
    winMusic.muted = false;
    sadMusic.muted = false;
    if (btn) btn.textContent = '🔊';
  }
}

function toggleSFX() {
  sfxEnabled = !sfxEnabled;
  const btn = document.getElementById('btn-sfx');
  if (sfxEnabled) {
    btn.title = 'Mute Sound Effects';
    btn.style.opacity = '1';
  } else {
    btn.title = 'Unmute Sound Effects';
    btn.style.opacity = '0.4';
  }
}

function playSFX(isCorrect) {
  if (!sfxEnabled) return;
  if (isCorrect) {
    soundCorrect.currentTime = 0;
    soundCorrect.play().catch(e => console.log("SFX play failed:", e));
  } else {
    soundIncorrect.currentTime = 0;
    soundIncorrect.play().catch(e => console.log("SFX play failed:", e));
  }
}

// Call initMusic to start playing
initMusic();

function togglePause() {
  if (answered && qi >= RAW.length) return; // Can't pause on results screen
  if (timeLeft <= 0) return; // Can't pause if time's up
  
  isPaused = !isPaused;
  const overlay = document.getElementById('pause-overlay');
  const pauseBtn = document.getElementById('btn-pause');
  
  if (isPaused) {
    if (timerInterval) clearInterval(timerInterval);
    overlay.style.display = 'flex';
    document.body.classList.add('is-paused');
    pauseBtn.textContent = '▶';
    pauseBtn.title = 'Resume Quiz';
  } else {
    overlay.style.display = 'none';
    document.body.classList.remove('is-paused');
    pauseBtn.textContent = '⏸';
    pauseBtn.title = 'Pause Quiz';
    
    // Resume timer
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timeUp();
      }
    }, 1000);
  }
}

function resetQuiz() {
  if (isPaused) togglePause();
  start();
}

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) {
    return h + ":" + String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
  } else {
    return String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
  }
}

function updateTimerUI() {
  const t = document.getElementById('hud-timer');
  if (t) t.textContent = formatTime(timeLeft);
}

function updateScoreUI() {
  const scoreStr = score.toFixed(2) + ' / 10.00';
  scoremeta.textContent = 'Score: ' + scoreStr;
  const hs = document.getElementById('hud-score');
  if (hs) hs.textContent = scoreStr;
}

function timeUp() {
  answered = true;
  lock();
  if (timerInterval) clearInterval(timerInterval);
  
  app.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'card result';
  
  if (score > 5) {
    card.style.border = '2px solid var(--green)';
    
    const title = document.createElement('div');
    title.className = 'score';
    title.style.color = 'var(--green)';
    title.style.fontSize = '32px';
    title.textContent = "Congratulations, you passed!";
    card.appendChild(title);
    
    const scoreVal = document.createElement('div');
    scoreVal.className = 'score';
    scoreVal.textContent = score.toFixed(2) + ' / 10.00';
    card.appendChild(scoreVal);
    
    const sub = document.createElement('div');
    sub.className = 'scoresub';
    sub.textContent = 'Awesome job! You successfully completed the quiz.';
    card.appendChild(sub);
    
    // Play Victory Music (Unmuted by default, updates UI state)
    bgMusic.pause();
    winMusic.currentTime = 0;
    winMusic.muted = false;
    winMusic.play().catch(e => console.log("Win music failed to play:", e));
    
    // Sync mute UI
    isMuted = false;
    const musicBtn = document.getElementById('btn-music');
    if (musicBtn) {
      musicBtn.textContent = '🔊';
      musicBtn.title = 'Mute Music';
    }
    
    // Congrats Image
    const img = document.createElement('img');
    img.src = 'congrats.png';
    img.alt = 'Congratulations!';
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    img.style.borderRadius = '8px';
    img.style.marginTop = '16px';
    img.style.marginBottom = '20px';
    img.style.display = 'block';
    img.style.marginLeft = 'auto';
    img.style.marginRight = 'auto';
    card.appendChild(img);
    
    // Start Confetti
    startConfetti();
  } else {
    card.style.border = '2px solid var(--red)';
    
    const title = document.createElement('div');
    title.className = 'score';
    title.style.color = 'var(--red)';
    title.style.fontSize = '32px';
    title.textContent = "Sorry, you did not pass.";
    card.appendChild(title);
    
    const scoreVal = document.createElement('div');
    scoreVal.className = 'score';
    scoreVal.textContent = score.toFixed(2) + ' / 10.00';
    card.appendChild(scoreVal);
    
    const sub = document.createElement('div');
    sub.className = 'scoresub';
    sub.textContent = 'Better luck next time! Keep practicing to improve your score.';
    card.appendChild(sub);
    
    // Play Sad Music (Unmuted by default, updates UI state)
    bgMusic.pause();
    sadMusic.currentTime = 0;
    sadMusic.muted = false;
    sadMusic.play().catch(e => console.log("Sad music failed to play:", e));
    
    // Sync mute UI
    isMuted = false;
    const musicBtn = document.getElementById('btn-music');
    if (musicBtn) {
      musicBtn.textContent = '🔊';
      musicBtn.title = 'Mute Music';
    }
    
    // Fail Image
    const img = document.createElement('img');
    img.src = 'fail.jpg';
    img.alt = 'Quiz Failed';
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    img.style.borderRadius = '8px';
    img.style.marginTop = '16px';
    img.style.marginBottom = '20px';
    img.style.display = 'block';
    img.style.marginLeft = 'auto';
    img.style.marginRight = 'auto';
    card.appendChild(img);
    
    // Start Rain
    startRain();
  }
  
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = 'Restart Quiz';
  btn.onclick = start;
  card.appendChild(btn);
  
  app.appendChild(card);
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function start(){
  stopConfetti();
  stopRain();
  winMusic.pause();
  winMusic.currentTime = 0;
  sadMusic.pause();
  sadMusic.currentTime = 0;
  
  // Set main music to mute by default (as per user request)
  isMuted = true;
  bgMusic.muted = true;
  const musicBtn = document.getElementById('btn-music');
  if (musicBtn) {
    musicBtn.textContent = '🔇';
    musicBtn.title = 'Unmute Music';
  }
  
  // Play bgMusic (muted) so it's ready to be unmuted
  bgMusic.play().catch(e => console.log("Music play failed:", e));
  
  order = shuffle(RAW.map((_,i)=>i));
  qi=0; score=0;
  timeLeft = 3600;
  isPaused = false;
  document.body.classList.remove('is-paused');
  const overlay = document.getElementById('pause-overlay');
  if (overlay) overlay.style.display = 'none';
  const pauseBtn = document.getElementById('btn-pause');
  if (pauseBtn) {
    pauseBtn.textContent = '⏸';
    pauseBtn.title = 'Pause Quiz';
  }
  updateTimerUI();
  updateScoreUI();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timeUp();
    }
  }, 1000);
  render();
}

function build(){
  const q = RAW[order[qi]];
  const opts = q.options.map((t,idx)=>({text:t, correct:q.correct.includes(idx)}));
  shuffle(opts);
  cur = {text:q.question, multi:q.multi, opts, selected:new Set(), els:[]};
}

function render(){
  answered=false;
  build();
  bar.style.width = (qi/RAW.length*100)+'%';
  prog.textContent = 'Question '+(qi+1)+' of '+RAW.length;
  updateScoreUI();

  const card=document.createElement('div'); card.className='card';
  const tag=document.createElement('span'); tag.className='qtype';
  tag.textContent = cur.multi?'Select one or more':'Select one';
  card.appendChild(tag);
  const qt=document.createElement('div'); qt.className='qtext'; qt.textContent=cur.text; card.appendChild(qt);

  cur.opts.forEach((o,i)=>{
    const el=document.createElement('button'); el.className='opt'+(cur.multi?'':' single');
    const mark=document.createElement('span'); mark.className='mark'; mark.textContent='';
    const lbl=document.createElement('span'); lbl.textContent=o.text;
    el.appendChild(mark); el.appendChild(lbl);
    el.onclick=()=>cur.multi?toggle(i):answerSingle(i);
    cur.els.push(el); card.appendChild(el);
  });

  const fb=document.createElement('div'); fb.className='feedback'; fb.id='fb'; card.appendChild(fb);
  const row=document.createElement('div'); row.className='row';
  if(cur.multi){
    const c=document.createElement('button'); c.className='btn'; c.id='confirm'; c.textContent='Confirm';
    c.onclick=confirmMulti; row.appendChild(c);
  }
  const n=document.createElement('button'); n.className='btn'; n.id='next';
  n.textContent = (qi===RAW.length-1)?'See results':'Next question';
  n.style.display='none'; n.onclick=next; row.appendChild(n);
  card.appendChild(row);

  app.innerHTML=''; app.appendChild(card);
}

function lock(){cur.els.forEach(e=>e.classList.add('locked'));}
function showNext(){document.getElementById('next').style.display='inline-block';}
function setFB(ok,msg){const f=document.getElementById('fb');f.className='feedback '+(ok?'ok':'no');f.textContent=msg;}

function answerSingle(i){
  if(answered) return; answered=true;
  if(cur.opts[i].correct){
    cur.els[i].classList.add('correct');
    score += 10 / RAW.length;
    setFB(true,'Correct!');
    playSFX(true);
  }
  else{
    cur.els[i].classList.add('wrong');
    cur.opts.forEach((o,j)=>{if(o.correct) cur.els[j].classList.add('correct');});
    setFB(false,'Incorrect — the correct answer is shown in green.');
    playSFX(false);
  }
  lock(); showNext();
  updateScoreUI();
}

function toggle(i){
  if(answered) return;
  if(cur.selected.has(i)){cur.selected.delete(i); cur.els[i].classList.remove('selected'); cur.els[i].querySelector('.mark').textContent='';}
  else{cur.selected.add(i); cur.els[i].classList.add('selected'); cur.els[i].querySelector('.mark').textContent='✓';}
}

function confirmMulti(){
  if(answered) return; answered=true;
  document.getElementById('confirm').style.display='none';
  let allCorrect=true;
  cur.opts.forEach((o,i)=>{
    const m=cur.els[i].querySelector('.mark');
    if(o.correct){
      cur.els[i].classList.remove('selected');
      if(cur.selected.has(i)){
        cur.els[i].classList.add('correct');
        m.textContent='✓';
      } else {
        cur.els[i].classList.add('missed');
        m.textContent='✓';
        allCorrect=false;
      }
    } else if(cur.selected.has(i)){
      cur.els[i].classList.remove('selected'); cur.els[i].classList.add('wrong'); m.textContent='✕';
      allCorrect=false;
    }
  });

  // Calculate score contribution
  const C = cur.opts.filter(o => o.correct).length;
  let K = 0;
  let W = 0;
  cur.opts.forEach((o, idx) => {
    if (cur.selected.has(idx)) {
      if (o.correct) K++;
      else W++;
    }
  });

  const effectiveK = Math.max(0, K - W);
  let credit = 0;
  if (C > 1) {
    if (effectiveK === C) credit = C;
    else if (effectiveK === C - 1) credit = 1;
  } else if (C === 1) {
    if (effectiveK === 1) credit = 1;
  }

  const questionVal = 10 / RAW.length;
  score += (credit / C) * questionVal;

  if(allCorrect){
    setFB(true,'Correct!');
    playSFX(true);
  }
  else {
    setFB(false,'Incorrect — missed correct answers are shown in yellow.');
    playSFX(false);
  }
  lock(); showNext();
  updateScoreUI();
}

function next(){
  qi++;
  if(qi>=RAW.length) finish(); else render();
}

function finish(){
  if (timerInterval) clearInterval(timerInterval);
  bar.style.width='100%';
  prog.textContent='Finished';
  updateScoreUI();
  
  app.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'card result';
  
  if (score > 5) {
    card.style.border = '2px solid var(--green)';
    
    const title = document.createElement('div');
    title.className = 'score';
    title.style.color = 'var(--green)';
    title.style.fontSize = '32px';
    title.textContent = "Congratulations, you passed!";
    card.appendChild(title);
    
    const scoreVal = document.createElement('div');
    scoreVal.className = 'score';
    scoreVal.textContent = score.toFixed(2) + ' / 10.00';
    card.appendChild(scoreVal);
    
    const pct = Math.round((score / 10) * 100);
    const sub = document.createElement('div');
    sub.className = 'scoresub';
    sub.textContent = `Completed with ${pct}% score! Awesome job.`;
    card.appendChild(sub);
    
    // Play Victory Music (Unmuted by default, updates UI state)
    bgMusic.pause();
    winMusic.currentTime = 0;
    winMusic.muted = false;
    winMusic.play().catch(e => console.log("Win music failed to play:", e));
    
    // Sync mute UI
    isMuted = false;
    const musicBtn = document.getElementById('btn-music');
    if (musicBtn) {
      musicBtn.textContent = '🔊';
      musicBtn.title = 'Mute Music';
    }
    
    // Congrats Image
    const img = document.createElement('img');
    img.src = 'congrats.png';
    img.alt = 'Congratulations!';
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    img.style.borderRadius = '8px';
    img.style.marginTop = '16px';
    img.style.marginBottom = '20px';
    img.style.display = 'block';
    img.style.marginLeft = 'auto';
    img.style.marginRight = 'auto';
    card.appendChild(img);
    
    // Start Confetti
    startConfetti();
  } else {
    card.style.border = '2px solid var(--red)';
    
    const title = document.createElement('div');
    title.className = 'score';
    title.style.color = 'var(--red)';
    title.style.fontSize = '32px';
    title.textContent = "Sorry, you did not pass.";
    card.appendChild(title);
    
    const scoreVal = document.createElement('div');
    scoreVal.className = 'score';
    scoreVal.textContent = score.toFixed(2) + ' / 10.00';
    card.appendChild(scoreVal);
    
    const pct = Math.round((score / 10) * 100);
    const sub = document.createElement('div');
    sub.className = 'scoresub';
    sub.textContent = `Completed with ${pct}% score. Try again to pass (needs > 5.00).`;
    card.appendChild(sub);
    
    // Play Sad Music (Unmuted by default, updates UI state)
    bgMusic.pause();
    sadMusic.currentTime = 0;
    sadMusic.muted = false;
    sadMusic.play().catch(e => console.log("Sad music failed to play:", e));
    
    // Sync mute UI
    isMuted = false;
    const musicBtn = document.getElementById('btn-music');
    if (musicBtn) {
      musicBtn.textContent = '🔊';
      musicBtn.title = 'Mute Music';
    }
    
    // Fail Image
    const img = document.createElement('img');
    img.src = 'fail.jpg';
    img.alt = 'Quiz Failed';
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    img.style.borderRadius = '8px';
    img.style.marginTop = '16px';
    img.style.marginBottom = '20px';
    img.style.display = 'block';
    img.style.marginLeft = 'auto';
    img.style.marginRight = 'auto';
    card.appendChild(img);
    
    // Start Rain
    startRain();
  }
  
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = 'Restart Quiz';
  btn.onclick = start;
  card.appendChild(btn);
  
  app.appendChild(card);
}

initConfetti();
start();
</script>
